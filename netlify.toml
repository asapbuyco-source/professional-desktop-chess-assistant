# Netlify Configuration for Chess Assistant
# Deploy with: netlify deploy --prod --dir=dist

[build]
  command = "npm install && npm run build"
  publish = "dist"

# FIX: Merged inline environment = { NODE_VERSION = "18.17.1" } from [build]
# into this single [build.environment] section. TOML does not allow defining
# the same key both inline and as a subtable header — that was the parse error.
[build.environment]
  NODE_VERSION = "18.17.1"
  NODE_ENV = "production"
  VITE_APP_ENV = "production"
  VITE_APP_VERSION = "1.0.0"

# ── Build processing ──────────────────────────────────────────────────────────

[build.processing]
  skip_processing = false

[build.processing.css]
  bundle = true
  minify = true

[build.processing.js]
  bundle = true
  minify = true

[build.processing.html]
  pretty_urls = true

# ── Context overrides ─────────────────────────────────────────────────────────

[context.production]
  command = "npm install && npm run build"
  environment = { NODE_ENV = "production", VITE_APP_ENV = "production" }

[context.deploy-preview]
  command = "npm install && npm run build"
  environment = { NODE_ENV = "production", VITE_APP_ENV = "production" }

[context.branch-deploy]
  command = "npm install && npm run build"
  environment = { NODE_ENV = "development", VITE_APP_ENV = "development" }

# ── SPA redirect ─────────────────────────────────────────────────────────────

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# ── Cache headers ─────────────────────────────────────────────────────────────

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Service-Worker-Allowed = "/"
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Content-Type = "application/manifest+json"
    Cache-Control = "public, max-age=86400"

# ── Security headers ──────────────────────────────────────────────────────────

[[headers]]
  for = "/*"
  [headers.values]
    # CSP: added worker-src 'self' for the engine Web Worker.
    # blob: allows Vite dev-mode worker URLs in some configurations.
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'wasm-unsafe-eval'; worker-src 'self' blob:; style-src 'self' 'unsafe-inline'; img-src 'self' data:; media-src 'self'; font-src 'self'; connect-src 'self'"
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    # FIX: removed microphone=() — that blocked the voice-input feature.
    # self allows microphone access only from the same origin.
    Permissions-Policy = "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(self), payment=(), usb=()"
    Service-Worker-Allowed = "/"
