# Netlify Configuration for Chess Assistant
# Deploy with: netlify deploy --prod --dir=dist

[build]
  # Netlify automatically runs npm install if it finds a package.json.
  # We just need to trigger the build.
  command = "npm run build"
  publish = "dist"

[build.environment]
  # Vite 7 requires Node 20.19.0+ or 22.12.0+. Using latest LTS (22).
  NODE_VERSION = "22"
  
  # IMPORTANT: Removed NODE_ENV = "production" from here.
  # If NODE_ENV is "production" during 'npm install', npm skips devDependencies.
  # Since vite and typescript are devDependencies, the build would fail with "vite: not found".
  
  VITE_APP_ENV = "production"
  VITE_APP_VERSION = "1.0.0"

# ── Build processing ──────────────────────────────────────────────────────────

[build.processing]
  skip_processing = false

[build.processing.css]
  bundle = true
  minify = true

[build.processing.js]
  bundle = true
  minify = true

[build.processing.html]
  pretty_urls = true

# ── Context overrides ─────────────────────────────────────────────────────────

[context.production]
  environment = { VITE_APP_ENV = "production" }

[context.deploy-preview]
  environment = { VITE_APP_ENV = "production" }

[context.branch-deploy]
  environment = { NODE_ENV = "development", VITE_APP_ENV = "development" }

# ── SPA redirect ─────────────────────────────────────────────────────────────

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# ── Cache headers ─────────────────────────────────────────────────────────────

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Service-Worker-Allowed = "/"
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Content-Type = "application/manifest+json"
    Cache-Control = "public, max-age=86400"

# ── Security headers ──────────────────────────────────────────────────────────

[[headers]]
  for = "/*"
  [headers.values]
    # CSP: Allow 'unsafe-inline' for Vite/React and worker-src for engine.
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'wasm-unsafe-eval' 'unsafe-inline'; worker-src 'self' blob:; style-src 'self' 'unsafe-inline'; img-src 'self' data:; media-src 'self'; font-src 'self'; connect-src 'self'"
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(self), payment=(), usb=()"
    Service-Worker-Allowed = "/"
